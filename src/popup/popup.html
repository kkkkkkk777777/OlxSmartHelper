<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <title>OLX Smart Helper</title>
  <style>
    :root {
      --bg: #14161c; --bg2: #1c1f28; --border: #2b2f3a;
      --text: #eef1f7; --dim: #9aa2b1; --green: #1fbf75; --red: #f0455f;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      width: 340px; background: var(--bg); color: var(--text);
      font-family: var(--font); font-size: 13px; line-height: 1.5;
    }
    .wrap { padding: 14px; }
    header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .logo { width: 26px; height: 26px; border-radius: 7px; background: var(--bg2);
      border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
    .logo span { width: 11px; height: 11px; border-radius: 50%; background: var(--green); }
    h1 { font-size: 14px; margin: 0; }
    .ver { font-size: 11px; color: var(--dim); }
    section { border-top: 1px solid var(--border); padding: 12px 0; }
    section:first-of-type { border-top: none; padding-top: 0; }
    h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .4px; color: var(--dim); margin: 0 0 8px; }
    /* presets */
    .pre { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-top: 1px solid var(--border); }
    .pre:first-child { border-top: none; }
    .pre-main { flex: 1 1 auto; min-width: 0; }
    .pre-label { font-weight: 700; font-size: 12.5px; }
    .pre-label .star { color: var(--green); margin-left: 5px; }
    .pre-text { font-size: 11px; color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pre-btn { background: transparent; border: none; color: var(--dim); cursor: pointer; font-size: 13px; padding: 2px 4px; }
    .pre-btn:hover { color: var(--text); }
    .pre-btn.del:hover { color: var(--red); }
    .empty { color: var(--dim); font-size: 12px; padding: 6px 0; }
    .row { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
    input {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 7px;
      color: var(--text); font-family: var(--font); font-size: 12.5px; padding: 7px 9px;
    }
    input.grow { flex: 1 1 120px; min-width: 0; }
    button.primary {
      background: var(--green); border: 1px solid var(--green); color: #05231a;
      border-radius: 7px; padding: 7px 12px; font-weight: 700; cursor: pointer; font-size: 12.5px;
    }
    button.ghost {
      background: transparent; border: 1px solid var(--border); color: var(--text);
      border-radius: 7px; padding: 7px 12px; font-weight: 600; cursor: pointer; font-size: 12.5px;
    }
    button.ghost:hover { border-color: #3a3f4c; }
    .toggle { display: flex; align-items: center; gap: 9px; cursor: pointer; font-size: 12.5px; }
    .toggle input { width: 15px; height: 15px; accent-color: var(--green); }
    .foot { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px solid var(--border); }
    .foot .hint { font-size: 10.5px; color: var(--dim); }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="logo"><span></span></div>
      <div>
        <h1>OLX Smart Helper</h1>
        <div class="ver">Версия <span id="ver">—</span></div>
      </div>
    </header>

    <section>
      <h2>Шаблоны сообщений</h2>
      <div id="presets"></div>
      <div class="row">
        <input id="p-label" class="grow" type="text" placeholder="Название" />
        <input id="p-text" class="grow" type="text" placeholder="Текст" />
        <button id="p-add" class="primary">+</button>
      </div>
    </section>

    <section>
      <h2>Отладка</h2>
      <label class="toggle">
        <input id="dbg" type="checkbox" />
        <span>Собирать диагностику извлечения</span>
      </label>
    </section>

    <div class="foot">
      <span class="hint">Больше — правый клик по значку</span>
      <button id="more" class="ghost">Все настройки</button>
    </div>
  </div>

  <script src="../core/store.js"></script>
  <script src="../core/presets.js"></script>
  <script src="popup.js"></script>
</body>
</html>
